name: Scanners

permissions:
  contents: read

on:
  pull_request:

jobs:
  vulncheck:
    name: Vulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: chainguard-actions/actions-checkout@84880c833d491e2b948e484ac6a8ce9da42795dc # v6
      - name: Set up Go
        uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
        with:
          go-version: "1.25" # GO_VERSION_DEF
          check-latest: true
      - name: Get official govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
        shell: bash
      - name: Run govulncheck
        run: govulncheck ./...
        shell: bash

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: chainguard-actions/actions-checkout@84880c833d491e2b948e484ac6a8ce9da42795dc # v6
      - name: Scan
        id: scan
        run: |
          set -eo pipefail;
          python3 -m pip install semgrep;
          semgrep scan --error --config https://semgrep.dev/p/trailofbits --config semgrep_configs

  versioncheck:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - name: Go Supported Version
        uses: dopplerhq/go-supported-version-check-action@v1
        with:
          go-version: "1.25" # GO_VERSION_DEF
          version-requirement: any-supported